<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <meta
    name="description"
    content="Impressum der Webseite Mein Air Fryer."
  />

  <title>Impressum | Mein Air Fryer</title>

  <link rel="stylesheet" href="style.css" />
  <link rel="stylesheet" href="impressum.css" />

  <script
    src="https://cdn.jsdelivr.net/npm/htmx.org@2.0.10/dist/htmx.min.js"
    integrity="sha384-H5SrcfygHmAuTDZphMHqBJLc3FhssKjG7w/CeCpFReSfwBWDTKpkzPP8c+cLsK+V"
    crossorigin="anonymous"
  ></script>

</head>

<body>
  <header
    hx-get="komponenten/header.html"
    hx-trigger="load"
    hx-swap="outerHTML"
  ></header>

  <main class="legal-page">
    <section class="legal-hero" aria-labelledby="impressum-title">
      <article class="legal-intro">
        <p class="legal-kicker">
          <span aria-hidden="true">●</span>
          Rechtliches
        </p>

        <h1 id="impressum-title">
          Impressum
        </h1>

        <p class="legal-lead">
          Angaben gemäß § 5 DDG sowie Hinweise zu den Inhalten
          dieser Webseite.
        </p>
      </article>
    </section>

    <section class="legal-details" aria-label="Anbieter und Kontakt">
    <article class="legal-card" aria-labelledby="provider-title">
      <p class="legal-card-kicker">
        Anbieter
      </p>

      <h2 id="provider-title">
        Angaben zum Anbieter
      </h2>

      <address>
        Max Mustermann<br />
        Musterstraße 12<br />
        12345 Musterstadt<br />
        Deutschland
      </address>
    </article>

    <article class="legal-card" aria-labelledby="contact-title">
      <p class="legal-card-kicker">
        Kontakt
      </p>

      <h2 id="contact-title">
        So erreichst du mich
      </h2>

      <address>
        Telefon:
        <a href="tel:0123456789">0123456789</a><br />

        E-Mail:
        <a href="mailto:kontakt@example.de">
          kontakt@example.de
        </a>
      </address>
    </article>
  </section>
  </main>

  <footer
    hx-get="komponenten/footer.html"
    hx-trigger="load"
    hx-swap="outerHTML"
  ></footer>
</body>
</html>
